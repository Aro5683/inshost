<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
font-family:monospace;
}

.topbar{
background:#222;
color:white;
padding:10px;
}

button{
padding:6px 12px;
margin-right:10px;
cursor:pointer;
}

.container{
display:flex;
height:100%;
}

#editor{
width:50%;
border:none;
outline:none;
padding:15px;
font-size:15px;
resize:none;
border-right:2px solid #ddd;
}

.preview-area{
width:50%;
display:flex;
justify-content:center;
align-items:center;
background:#f5f5f5;
}

#preview{
border:none;
width:100%;
height:100%;
background:white;
}

/* mobile simulation */

.mobile{
width:360px !important;
height:640px !important;
border:8px solid black;
border-radius:25px;
}

</style>
</head>

<body>

<div class="topbar">

<button onclick="mobileView()">📱 Mobile View</button>
<button onclick="pcView()">💻 PC View</button>
<button onclick="resetEditor()">🧹 Clear / Reset</button>

</div>

<div class="container">

<textarea id="editor"></textarea>

<div class="preview-area">
<iframe id="preview"></iframe>
</div>

</div>

<script>

const editor = document.getElementById("editor");
const preview = document.getElementById("preview");

const defaultCode = `
<meta name="viewport" content="width=device-width, initial-scale=1">

<h1>Hello Developer 🚀</h1>
<p>Start writing your HTML here...</p>

<style>
body{
font-family:sans-serif;
padding:20px;
}

h1{
color:blue;
}
</style>
`;

function updatePreview(){
preview.srcdoc = editor.value;
}

editor.addEventListener("input", updatePreview);

function mobileView(){
preview.classList.add("mobile");
}

function pcView(){
preview.classList.remove("mobile");
}

function resetEditor(){
editor.value = defaultCode;
updatePreview();
}

editor.value = defaultCode;
updatePreview();

</script>

</body>
</html>
