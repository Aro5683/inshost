<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
font-family:monospace;
}

.topbar{
background:#222;
color:white;
padding:10px;
}

button{
padding:6px 12px;
margin-right:10px;
cursor:pointer;
}

.container{
display:flex;
height:100%;
}

#editor{
width:50%;
border:none;
outline:none;
padding:15px;
font-size:15px;
border-right:2px solid #ddd;
resize:none;
}

.preview-container{
width:50%;
display:flex;
justify-content:center;
align-items:center;
background:#f0f0f0;
}

.phone{
width:360px;
height:640px;
border:10px solid black;
border-radius:25px;
overflow:hidden;
background:white;
}

#preview{
width:100%;
height:100%;
border:none;
}

.pc-view{
width:100%;
height:100%;
border:none;
}

</style>
</head>

<body>

<div class="topbar">
<button onclick="mobileView()">📱 Mobile View</button>
<button onclick="pcView()">💻 PC View</button>
</div>

<div class="container">

<textarea id="editor">

<meta name="viewport" content="width=device-width, initial-scale=1">

<h1>Hello Mobile 🌍</h1>
<p>This is mobile preview</p>

<style>
body{
font-family:sans-serif;
padding:20px;
}

h1{
color:blue;
}
</style>

</textarea>

<div class="preview-container">

<div id="frame" class="phone">
<iframe id="preview"></iframe>
</div>

</div>

</div>

<script>

const editor = document.getElementById("editor");
const preview = document.getElementById("preview");
const frame = document.getElementById("frame");

function updatePreview(){
preview.srcdoc = editor.value;
}

editor.addEventListener("input", updatePreview);

function mobileView(){
frame.className = "phone";
}

function pcView(){
frame.className = "";
preview.className = "pc-view";
}

updatePreview();

</script>

</body>
</html>
